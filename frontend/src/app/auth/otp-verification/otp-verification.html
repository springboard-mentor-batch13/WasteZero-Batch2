<main class="min-h-screen flex items-center justify-center bg-slate-100 px-4 py-8">

  <div class="w-full max-w-md rounded-xl border border-slate-200 bg-white p-8 shadow-lg">

    <div class="text-center">
      <p class="text-sm font-semibold uppercase tracking-wide text-emerald-700">
        Verify Account
      </p>

      <h1 class="mt-2 text-3xl font-bold text-slate-900">
        OTP Verification
      </h1>

      <p class="mt-3 text-sm text-slate-500">
        Enter the OTP sent to your email address.
      </p>
    </div>

    <form class="mt-8 space-y-5" (ngSubmit)="verifyOtp()">

      <div>
        <label class="block text-sm font-semibold text-slate-800">
          OTP
        </label>

        <input
          type="text"
          maxlength="6"
          name="otp"
          [(ngModel)]="otp"
          placeholder="Enter 6-digit OTP"
          class="mt-2 w-full rounded-lg border border-slate-300 px-4 py-3 outline-none focus:border-emerald-600"
        />
      </div>

      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full rounded-lg bg-emerald-700 py-3 text-lg font-semibold text-white hover:bg-emerald-800 disabled:opacity-50"
      >
        {{ isLoading ? 'Verifying...' : 'Verify OTP' }}
      </button>

      <div class="text-center">
        <button
          type="button"
          (click)="resendOtp()"
          class="text-sm font-semibold text-emerald-700 hover:underline"
        >
          Resend OTP
        </button>
      </div>

    </form>

  </div>

</main>
