<main class="otp-page min-h-screen bg-cover bg-center bg-no-repeat">
  <!-- Overlay -->
  <div class="min-h-screen bg-black/35 flex">

    <!-- LEFT SIDE -->
    <section
      class="hidden lg:flex w-3/5 flex-col justify-center px-20 text-white"
    >

      <h1 class="text-7xl font-extrabold leading-none">
        🌱
        <span class="text-emerald-400">Waste</span><span class="text-white">Zero</span>
      </h1>

      <h2 class="mt-4 text-2xl font-semibold">
        Smart Waste Management System
      </h2>

      <p class="mt-12 max-w-xl text-3xl leading-relaxed font-light">
        "Every piece of waste recycled is a step toward a sustainable future."
      </p>

      <p class="mt-16 text-lg italic text-white/80">
        ~ Batch_02
      </p>

    </section>

    <!-- RIGHT SIDE -->
    <section
      class="flex w-full lg:w-2/5 items-center justify-end pr-16"
    >

      <div class="w-full max-w-lg">

        <div
          class="rounded-3xl border border-white/20 bg-white/15 backdrop-blur-xl p-10 shadow-2xl"
        >

          <div class="text-center">

            <p class="text-sm font-semibold uppercase tracking-widest text-emerald-300">
              Verify Account
            </p>

            <h1 class="mt-3 text-5xl font-bold text-white">
              OTP Verification
            </h1>

            <p class="mt-3 text-white/80">
              Enter the 6-digit verification code sent to your email.
            </p>

          </div>

          <form
            class="mt-10 space-y-6"
            (ngSubmit)="verifyOtp()"
          >

            <div>

              <label
                class="block text-sm font-semibold text-white"
              >
                OTP Code
              </label>

              <input
                type="text"
                maxlength="6"
                name="otp"
                [(ngModel)]="otp"
                placeholder="Enter 6-digit OTP"
                class="mt-2 w-full rounded-xl border border-white/30 bg-white/20 px-4 py-4 text-center text-2xl tracking-[0.5em] text-white placeholder:text-white/60 outline-none backdrop-blur-sm"
              />

            </div>

            <button
              type="submit"
              [disabled]="isLoading"
              class="w-full rounded-xl bg-gradient-to-r from-emerald-600 to-green-500 py-4 text-xl font-bold text-white shadow-xl transition duration-300 hover:scale-[1.02] hover:from-emerald-500 hover:to-green-400 disabled:opacity-50"
            >
              {{ isLoading ? 'Verifying...' : 'Verify OTP' }}
            </button>

            <div class="text-center">

              <button
                type="button"
                (click)="resendOtp()"
                class="font-semibold text-emerald-300 hover:text-white transition"
              >
                Resend OTP
              </button>

            </div>

          </form>

        </div>

      </div>

    </section>

  </div>

</main>
