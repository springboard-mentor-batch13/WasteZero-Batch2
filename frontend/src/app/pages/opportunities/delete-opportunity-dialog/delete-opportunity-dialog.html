<h2 mat-dialog-title>Are you sure?</h2>

<mat-dialog-content>
  This action cannot be undone. This will permanently delete the opportunity <strong>{{ data.title }}</strong>.
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button [disabled]="loading" (click)="dialogRef.close(false)">Cancel</button>
  <button mat-flat-button class="delete-button" [disabled]="loading" (click)="confirm()">
    @if (loading) { <mat-spinner diameter="18"></mat-spinner> } @else { Delete }
  </button>
</mat-dialog-actions>
