<div class="container">

  <h2>Volunteer Opportunities</h2>

  <div class="top-section">

    <!-- Search -->
    <input
      type="text"
      placeholder="Search Opportunity..."
      [(ngModel)]="searchText">

    <!-- Location Filter -->
    <select [(ngModel)]="selectedLocation">
      <option value="All">All Locations</option>
      <option value="Marina Beach, Chennai">Marina Beach, Chennai</option>
      <option value="Adyar Community Hall, Chennai">Adyar Community Hall, Chennai</option>
      <option value="Velachery Learning Centre">Velachery Learning Centre</option>
      <option value="Besant Nagar, Chennai">Besant Nagar, Chennai</option>
      <option value="T. Nagar, Chennai">T. Nagar, Chennai</option>
    </select>

  </div>

  <div class="card-grid">

    <div
      class="card"
      *ngFor="let opportunity of filteredOpportunities">

      <img
        src="https://placehold.co/600x350?text=Volunteer+Opportunity"
        alt="Opportunity">

      <div class="card-body">

        <h3>{{ opportunity.title }}</h3>

        <p>{{ opportunity.description }}</p>

        <p>
          <strong>Category:</strong>
          {{ opportunity.category }}
        </p>

        <p>
          📍 {{ opportunity.location }}
        </p>

        <p>
          📅 {{ opportunity.eventDate }}
        </p>

        <p>
          👥 {{ opportunity.requiredVolunteers }} Volunteers
        </p>

        <p><strong>Skills Required:</strong></p>

        <div class="skills">

          <span
            *ngFor="let skill of opportunity.skillsRequired">
            {{ skill }}
          </span>

        </div>

        <button
          (click)="viewDetails(opportunity.id)">
          View Details
        </button>

      </div>

    </div>

  </div>

</div>
