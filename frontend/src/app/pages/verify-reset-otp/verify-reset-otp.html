<main class="min-h-screen flex items-center justify-center bg-slate-100 px-4 py-8">

  <div class="w-full max-w-md">

    <div class="rounded-xl border border-slate-200 bg-white p-8 shadow-lg">

      <div class="text-center">

        <p class="text-sm font-semibold uppercase tracking-wide text-emerald-700">
          Verify OTP
        </p>

        <h2 class="mt-2 text-3xl font-bold text-slate-900">
          Enter Verification Code
        </h2>

        <p class="mt-3 text-sm text-slate-500">
          Enter the 6-digit OTP sent to your registered email.
        </p>

      </div>

      <form
        class="mt-8 space-y-5"
        [formGroup]="otpForm"
        (ngSubmit)="onSubmit()"
        novalidate
      >

        <div>

          <label
            for="otp"
            class="block text-sm font-semibold text-slate-800"
          >
            OTP
          </label>

          <input
            id="otp"
            type="text"
            maxlength="6"
            formControlName="otp"
            placeholder="Enter OTP"
            class="mt-2 w-full rounded-lg border px-4 py-3 outline-none transition"
            [class.border-red-400]="showError()"
            [class.border-slate-300]="!showError()"
          />

          @if(showError()){

          <p class="mt-2 text-sm text-red-600">

            @if(otp.hasError('required')){
              OTP is required.
            } @else {
              Enter a valid 6-digit OTP.
            }

          </p>

          }

        </div>

        <button
          type="submit"
          class="w-full rounded-lg bg-emerald-700 py-3 text-lg font-semibold text-white transition hover:bg-emerald-800"
        >
          Verify OTP
        </button>

      </form>

      <p class="mt-8 text-center text-sm text-slate-600">

        Didn't receive the OTP?

        <a
          routerLink="/forgot-password"
          class="font-bold text-emerald-700 hover:underline"
        >
          Send Again
        </a>

      </p>

    </div>

  </div>

</main>
